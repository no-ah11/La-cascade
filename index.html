<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0A1628" />
  <title>Coracia — Le sanctuaire vous attend</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="no-nav">
  <div id="particles" style="position:fixed; inset:0; pointer-events:none; z-index:0;"></div>

  <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1;">
    <div id="splash-logo" style="opacity:0; transform: scale(0.8); transition: opacity 800ms var(--ease-out), transform 800ms var(--ease-out); margin-bottom: 28px;">
      <svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4DB8FF"/>
            <stop offset="100%" stop-color="#5BD4FF"/>
          </linearGradient>
        </defs>
        <path d="M60 18 C 42 22, 32 42, 38 56 L 30 64 C 20 60, 10 66, 14 72 C 22 70, 30 72, 36 76 L 30 84 C 26 84, 22 92, 28 94 C 38 92, 48 90, 60 92 L 60 102 L 60 92 C 72 90, 82 92, 92 94 C 98 92, 94 84, 90 84 L 84 76 C 90 72, 98 70, 106 72 C 110 66, 100 60, 90 64 L 82 56 C 88 42, 78 22, 60 18 Z" fill="url(#logoGrad)"/>
        <circle cx="60" cy="38" r="4" fill="#0A1628"/>
        <path d="M56 46 L 64 46 L 60 52 Z" fill="#F5A623"/>
      </svg>
    </div>

    <div id="splash-name" style="opacity:0; transform: translateY(10px); transition: opacity 800ms var(--ease-out) 300ms, transform 800ms var(--ease-out) 300ms; font-family: var(--font-display); font-weight: 600; font-size:48px; color: var(--color-accent-blue); letter-spacing: -0.01em;">
      Coracia
    </div>

    <div id="splash-sub" style="opacity:0; transition: opacity 600ms var(--ease-out) 800ms; color: var(--color-text-muted); font-size:16px; margin-top:8px; font-style: italic;">
      Le sanctuaire vous attend
    </div>

    <div style="margin-top:60px; opacity:0; animation: fadeIn 600ms var(--ease-out) 1200ms forwards;">
      <div class="splash-progress">
        <div class="splash-progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const particles = document.getElementById('particles');
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        const size = 2 + Math.random() * 3;
        p.style.cssText = `position:absolute; width:${size}px; height:${size}px; background:rgba(255,255,255,${0.1 + Math.random() * 0.2}); border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; animation: drift ${8 + Math.random() * 6}s ease-in-out ${Math.random() * 4}s infinite;`;
        particles.appendChild(p);
      }
      requestAnimationFrame(() => {
        const logo = document.getElementById('splash-logo');
        const name = document.getElementById('splash-name');
        const sub = document.getElementById('splash-sub');
        logo.style.opacity = '1';
        logo.style.transform = 'scale(1)';
        name.style.opacity = '1';
        name.style.transform = 'translateY(0)';
        sub.style.opacity = '1';
      });
      setTimeout(() => {
        const visited = localStorage.getItem('coracia_visited');
        document.body.style.transition = 'opacity 300ms ease';
        document.body.style.opacity = '0';
        setTimeout(() => {
          window.location.href = visited ? 'accueil.html' : 'onboarding.html';
        }, 300);
      }, 2400);
    })();
  </script>
</body>
</html>
