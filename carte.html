<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0A1628" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/logo-sillans.svg" />
  <link rel="apple-touch-icon" href="assets/icons/logo-sillans.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sillans" />
  <title>Sillans-la-Cascade — Carte</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    #map-wrap {
      position: relative;
      width: 100%;
    }
    #map {
      width: 100%;
      height: calc(100vh - 124px);
      min-height: 400px;
    }
    /* Filtre sombre sur les tuiles uniquement — pas sur les marqueurs */
    .leaflet-tile-pane {
      filter: brightness(0.85);
    }
    /* Bouton Me localiser */
    #btn-locate {
      position: absolute;
      bottom: 90px;
      right: 14px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(10,22,40,0.75);
      border: 1px solid rgba(80,177,254,0.35);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #btn-locate:active { background: rgba(80,177,254,0.2); }
    #gps-msg {
      display: none;
      position: absolute;
      bottom: 144px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(10,22,40,0.85);
      border: 1px solid rgba(80,177,254,0.3);
      backdrop-filter: blur(12px);
      color: var(--color-text-muted);
      font-size: 13px;
      font-style: italic;
      padding: 10px 16px;
      border-radius: var(--radius-pill);
      white-space: nowrap;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .bottom-sheet.shake { animation: shake 200ms ease-in-out 2; }
    /* Attribution Leaflet discrète */
    .leaflet-control-attribution {
      background: rgba(10,22,40,0.6) !important;
      color: rgba(255,255,255,0.35) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: rgba(80,177,254,0.6) !important; }
  </style>
  <script src="js/pwa.js" defer></script>
</head>
<body class="no-scroll">
  <div class="page-header">
    <h1>Carte</h1>
    <div class="badge-offline" id="badge-offline">Hors-ligne</div>
  </div>

  <div id="map-wrap">
    <div id="map">
      <div id="map-fallback" style="display:none; height:100%; align-items:center;
           justify-content:center; text-align:center; padding:32px 24px;
           color:var(--color-text-muted); font-size:14px; line-height:1.7;">
        Carte indisponible hors-ligne.<br/>
        Les 6 points du parcours restent accessibles via le parcours.
      </div>
    </div>

    <button id="btn-locate" aria-label="Me localiser">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
           stroke="#50B1FE" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        <circle cx="12" cy="12" r="8" opacity="0.35"/>
      </svg>
    </button>

    <div id="gps-msg"></div>
  </div>

  <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
  <div class="bottom-sheet" id="sheet"></div>

  <nav class="nav-bar">
    <a class="nav-item" data-nav="accueil.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Accueil
    </a>
    <a class="nav-item active" href="carte.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      Carte
    </a>
    <a class="nav-item" data-nav="apres-visite.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Après visite
    </a>
  </nav>

  <script src="data/content.js"></script>
  <script src="js/state.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/ambiance.js"></script>
  <script src="js/carte.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initCarte();
    });
  </script>
</body>
</html>
