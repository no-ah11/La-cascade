<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0A1628" />
  <title>Sillans-la-Cascade — Le sanctuaire vous attend</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="no-nav">
  <div id="particles" style="position:fixed; inset:0; pointer-events:none; z-index:0;"></div>

  <div style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1;">
    <div id="splash-logo" style="opacity:0; transform: scale(0.8); transition: opacity 800ms var(--ease-out), transform 800ms var(--ease-out); margin-bottom: 24px; filter: drop-shadow(0 8px 32px rgba(77,184,255,0.35));">
      <img src="assets/icons/logo-sillans.svg" alt="Sillans-la-Cascade" width="160" height="144" />
    </div>

    <div id="splash-name" style="opacity:0; transform: translateY(10px); transition: opacity 800ms var(--ease-out) 300ms, transform 800ms var(--ease-out) 300ms; font-family: var(--font-display); font-weight: 600; font-size:40px; color: var(--color-text); letter-spacing: -0.01em; text-align:center; line-height:1.1;">
      Sillans-la-Cascade
    </div>

    <div id="splash-sub" style="opacity:0; transition: opacity 600ms var(--ease-out) 800ms; color: var(--color-text-muted); font-size:16px; margin-top:10px; font-style: italic;">
      Le sanctuaire vous attend
    </div>

    <div style="margin-top:60px; opacity:0; animation: fadeIn 600ms var(--ease-out) 1200ms forwards;">
      <div class="splash-progress">
        <div class="splash-progress-fill"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const particles = document.getElementById('particles');
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('div');
        const size = 2 + Math.random() * 3;
        p.style.cssText = `position:absolute; width:${size}px; height:${size}px; background:rgba(255,255,255,${0.1 + Math.random() * 0.2}); border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; animation: drift ${8 + Math.random() * 6}s ease-in-out ${Math.random() * 4}s infinite;`;
        particles.appendChild(p);
      }
      requestAnimationFrame(() => {
        const logo = document.getElementById('splash-logo');
        const name = document.getElementById('splash-name');
        const sub = document.getElementById('splash-sub');
        logo.style.opacity = '1';
        logo.style.transform = 'scale(1)';
        name.style.opacity = '1';
        name.style.transform = 'translateY(0)';
        sub.style.opacity = '1';
      });
      setTimeout(() => {
        const visited = localStorage.getItem('coracia_visited');
        document.body.style.transition = 'opacity 300ms ease';
        document.body.style.opacity = '0';
        setTimeout(() => {
          window.location.href = visited ? 'accueil.html' : 'onboarding.html';
        }, 300);
      }, 2400);
    })();
  </script>
</body>
</html>
