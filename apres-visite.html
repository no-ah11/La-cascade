<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0A1628" />
  <title>Coracia — Après visite</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    .action-grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }
    .action-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 18px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      transition: background 150ms var(--ease-out);
      cursor: pointer;
      width: 100%;
    }
    .action-card:active { background: var(--color-surface-2); }
    .action-card-icon { width: 28px; height: 28px; color: var(--color-text-muted); }
    .action-card-label { font-size: 12px; color: var(--color-text); line-height: 1.3; }
    .stars { display:flex; gap:8px; justify-content:center; margin: 20px 0; }
    .star { width:40px; height:40px; cursor:pointer; color: var(--color-text-muted); transition: color 150ms ease, transform 150ms ease; }
    .star.active { color: var(--color-accent-orange); transform: scale(1.1); }
    .star svg { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>Après la visite</h1>
    <div class="badge-offline">Hors-ligne</div>
  </div>

  <div class="container" style="padding-top: 0;">

    <div class="card anim-slide-up" style="padding: 18px;">
      <div style="display:flex; align-items:flex-start; gap:16px;">
        <div style="text-align:center;">
          <div style="width:36px; height:36px; margin-bottom:4px;" id="rec-logo"></div>
          <div style="font-size:11px; color: var(--color-text-muted); text-transform:uppercase; letter-spacing:0.1em;">améliorer</div>
        </div>
        <div style="flex:1;">
          <div class="tracked" style="margin-bottom:8px;">Couleurs restaurées</div>
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="couleurs-segments" id="couleurs-segments" style="flex:1;">
              <div class="couleur-segment" data-key="blue"></div>
              <div class="couleur-segment" data-key="green"></div>
              <div class="couleur-segment" data-key="orange"></div>
              <div class="couleur-segment" data-key="red"></div>
            </div>
            <div class="couleurs-score" id="couleurs-score">0 / 4</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card anim-slide-up delay-100" style="margin-top: 20px; padding: 20px; opacity:0;">
      <div style="display:flex; align-items:flex-start; gap:16px;">
        <div style="width:48px; height:48px; border-radius:50%; background: rgba(168, 230, 61, 0.12); border: 1.5px solid rgba(168, 230, 61, 0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#A8E63D" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div style="flex:1;">
          <h3 style="margin-bottom:4px;">Quiz sur le lieu</h3>
          <p class="muted" style="font-size:14px; margin-bottom:10px;">Teste ce que tu as appris sur les lieux visités.</p>
          <div style="display:flex; gap:8px;">
            <span class="badge badge-green">5 questions</span>
            <span class="badge">3 min</span>
          </div>
        </div>
      </div>
      <button class="btn-primary" style="margin-top:16px;" data-nav="quiz.html">
        Commencer le quiz <span aria-hidden="true">→</span>
      </button>
    </div>

    <div class="card anim-slide-up delay-200" style="margin-top: 16px; padding: 20px; opacity:0;">
      <div style="display:flex; align-items:flex-start; gap:16px;">
        <div style="width:48px; height:48px; border-radius:50%; background: rgba(77, 184, 255, 0.12); border: 1.5px solid rgba(77, 184, 255, 0.4); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#4DB8FF" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div style="flex:1;">
          <h3 style="margin-bottom:4px;">Feedback sur la visite</h3>
          <p class="muted" style="font-size:14px;">Ton avis aide le sanctuaire à grandir.</p>
        </div>
      </div>
      <button class="btn-secondary" style="margin-top:16px;" onclick="openFeedback()">
        ★ Donner mon avis
      </button>
    </div>

    <div class="action-grid">
      <button class="action-card anim-slide-up delay-300" style="opacity:0;" onclick="revivreParcours()">
        <svg class="action-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><path d="M21 17l-5-5-7 7"/></svg>
        <div class="action-card-label">Revivre le<br/>parcours</div>
      </button>
      <button class="action-card anim-slide-up delay-400" style="opacity:0;" onclick="partagerVisite()">
        <svg class="action-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <div class="action-card-label">Partager la<br/>visite</div>
      </button>
      <button class="action-card anim-slide-up delay-500" style="opacity:0;" onclick="openCollection()">
        <svg class="action-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/></svg>
        <div class="action-card-label">Collection</div>
      </button>
    </div>

  </div>

  <nav class="nav-bar">
    <a class="nav-item" data-nav="accueil.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      Accueil
    </a>
    <a class="nav-item" data-nav="carte.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      Carte
    </a>
    <a class="nav-item active" href="apres-visite.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Après visite
    </a>
  </nav>

  <script src="data/content.js"></script>
  <script src="js/state.js"></script>
  <script src="js/rollier.js"></script>
  <script src="js/navigation.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('rec-logo').innerHTML = getRollierSVG('#4DB8FF');

      const state = STATE.load();
      const segments = document.querySelectorAll('#couleurs-segments .couleur-segment');
      const score = document.getElementById('couleurs-score');
      let count = 0;
      segments.forEach(seg => {
        const key = seg.getAttribute('data-key');
        if (state.couleurs_unlocked[key]) {
          seg.classList.add(`filled-${key}`);
          count++;
        }
      });
      score.textContent = `${count} / 4`;
    });

    function openFeedback() {
      let stars = 0;
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal" style="position:relative;">
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          <h3 style="margin-bottom: 8px;">Ton avis sur la visite</h3>
          <p class="muted" style="font-size:13px;">Aide-nous à améliorer l'expérience.</p>
          <div class="stars" id="stars">
            ${[1,2,3,4,5].map(i => `<div class="star" data-i="${i}"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>`).join('')}
          </div>
          <textarea placeholder="Ton commentaire (facultatif)…" style="width:100%; min-height:80px; padding:12px; background: var(--color-surface-2); border:1px solid var(--color-border); border-radius:8px; color: var(--color-text); font-family: inherit; font-size:14px; resize: vertical;"></textarea>
          <button class="btn-primary" style="margin-top:16px;" onclick="submitFeedback(this)">Envoyer</button>
        </div>
      `;
      document.body.appendChild(modal);
      requestAnimationFrame(() => modal.classList.add('open'));
      modal.querySelectorAll('.star').forEach(s => {
        s.addEventListener('click', () => {
          stars = parseInt(s.getAttribute('data-i'));
          modal.querySelectorAll('.star').forEach((el, i) => el.classList.toggle('active', i < stars));
        });
      });
    }

    function submitFeedback(btn) {
      const modal = btn.closest('.modal-overlay');
      modal.querySelector('.modal').innerHTML = `
        <div style="text-align:center; padding: 20px 12px;">
          <div style="font-size:48px; margin-bottom:12px;">✓</div>
          <h3>Merci, voyageur</h3>
          <p class="muted" style="font-size:14px; margin-top:8px;">Ton retour nourrit le sanctuaire.</p>
        </div>
      `;
      setTimeout(() => {
        modal.classList.remove('open');
        setTimeout(() => modal.remove(), 250);
      }, 1500);
    }

    function revivreParcours() {
      if (confirm('Revivre le parcours réinitialise ta progression. Continuer ?')) {
        STATE.reset();
        localStorage.removeItem('coracia_visited');
        navigateTo('accueil.html');
      }
    }

    function partagerVisite() {
      const state = STATE.load();
      const text = `J'ai restauré ${state.couleurs_restaurees}/4 couleurs du sanctuaire Coracia !`;
      const url = window.location.origin + window.location.pathname.replace('apres-visite.html', '');
      if (navigator.share) {
        navigator.share({ title: 'Coracia — Le sanctuaire', text, url }).catch(() => {});
      } else {
        const ta = document.createElement('textarea');
        ta.value = `${text} ${url}`;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Lien copié dans le presse-papiers !');
      }
    }

    function openCollection() {
      const state = STATE.load();
      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal" style="position:relative;">
          <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
          <h3 style="margin-bottom: 12px;">Collection</h3>
          <p class="muted" style="font-size:13px; margin-bottom: 20px;">Les couleurs que tu as restaurées dans le sanctuaire.</p>
          ${Object.entries(COULEUR_LABELS).map(([key, info]) => {
            const colorMap = { blue: '#4DB8FF', green: '#A8E63D', orange: '#F5A623', red: '#E05C3A' };
            const unlocked = state.couleurs_unlocked[key];
            return `
              <div style="display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--color-border); ${!unlocked ? 'opacity:0.4;' : ''}">
                <div style="width:40px; height:40px; border-radius:50%; background: ${unlocked ? colorMap[key] : '#2A3F5A'}; ${unlocked ? `box-shadow: 0 0 16px ${colorMap[key]}40;` : ''}"></div>
                <div style="flex:1;">
                  <div style="font-family: var(--font-display); font-weight:600; font-size:17px; color: ${unlocked ? colorMap[key] : 'var(--color-text-muted)'};">${info.nom}</div>
                  <div class="muted" style="font-size:12px;">${unlocked ? info.desc : 'Pas encore restaurée'}</div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      document.body.appendChild(modal);
      requestAnimationFrame(() => modal.classList.add('open'));
    }
  </script>
</body>
</html>
